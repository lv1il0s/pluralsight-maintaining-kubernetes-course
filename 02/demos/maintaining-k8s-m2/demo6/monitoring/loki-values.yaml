loki:
  commonConfig:
    replication_factor: 1
  schemaConfig:
    configs:
      - from: "2024-04-01"
        store: tsdb
        object_store: s3
        schema: v13
        index:
          prefix: loki_index_
          period: 24h
  auth_enabled: false
  storage:
    bucketNames:
      chunks: loki-chunks
      ruler: loki-ruler
      admin: loki-admin
    type: s3
    s3:
      endpoint: loki-minio:9000
      insecure: true
      s3ForcePathStyle: true
      accessKeyId: loki
      secretAccessKey: supersecret

# Enable MinIO for object storage (S3-compatible, runs in cluster)
minio:
  enabled: true
  persistence:
    enabled: true
    storageClass: ebs-sc
    size: 5Gi

# Deploy in SingleBinary mode (one pod with all components)
deploymentMode: SingleBinary

singleBinary:
  replicas: 1

# Disable caching layers (not needed for demo, too memory-intensive)
chunksCache:
  enabled: false

resultsCache:
  enabled: false

# Zero out other deployment modes
backend:
  replicas: 0
read:
  replicas: 0
write:
  replicas: 0

# Disable enterprise features
enterprise:
  enabled: false

# Test mode settings
test:
  enabled: false
