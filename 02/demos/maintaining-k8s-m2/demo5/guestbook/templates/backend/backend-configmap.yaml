apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-backend-code
data:
  server.py: |
    from flask import Flask, jsonify, request
    from flask_cors import CORS
    from prometheus_client import Counter, Histogram, Gauge, generate_latest, CONTENT_TYPE_LATEST
    import redis
    import os
    import socket
    import time
    import sys

    app = Flask(__name__)
    CORS(app)

    # Connect to Redis
    redis_host = os.getenv('REDIS_HOST', 'localhost')
    redis_port = int(os.getenv('REDIS_PORT', 6379))
    app_version = os.getenv('APP_VERSION', '1.0.0')

    r = redis.Redis(host=redis_host, port=redis_port, decode_responses=True)
    hostname = socket.gethostname()

    # Test Redis connection on startup
    print(f"Testing Redis connection to {redis_host}:{redis_port}...")
    try:
        r.ping()
        print("✅ Redis connection successful!")
    except Exception as e:
        print(f"❌ Failed to connect to Redis: {e}")
        print(f"   Host: {redis_host}:{redis_port}")
        print("   Application cannot start without Redis")
        sys.exit(1)

    # Prometheus Metrics
    request_count = Counter('guestbook_requests_total', 'Total number of requests', ['method', 'endpoint', 'status'])
    counter_increments = Counter('guestbook_counter_increments_total', 'Total number of counter increments')
    request_duration = Histogram('guestbook_request_duration_seconds', 'Request duration in seconds', ['method', 'endpoint'])
    current_counter_value = Gauge('guestbook_counter_value', 'Current counter value from Redis')
    redis_errors = Counter('guestbook_redis_errors_total', 'Total Redis errors')
    chaos_injections = Counter('guestbook_chaos_injections_total', 'Total chaos injections', ['type'])
    slo_violations = Counter('guestbook_slo_violations_total', 'SLO violations', ['type'])

    @app.before_request
    def before_request():
        request.start_time = time.time()

    @app.after_request
    def after_request(response):
        if hasattr(request, 'start_time'):
            duration = time.time() - request.start_time
            request_duration.labels(method=request.method, endpoint=request.path).observe(duration)
            request_count.labels(method=request.method, endpoint=request.path, status=response.status_code).inc()

            # Track SLO violations (latency > 200ms or 5xx errors)
            if duration > 0.2:
                slo_violations.labels(type='latency').inc()
            if response.status_code >= 500:
                slo_violations.labels(type='availability').inc()
        return response

    @app.route('/api/counter', methods=['GET'])
    def get_counter():
        try:
            counter = r.get('visit_counter')
            if counter is None:
                r.set('visit_counter', 0)
                counter = 0
            counter = int(counter)
            current_counter_value.set(counter)
            frontend_pod = request.headers.get('X-Frontend-Pod', 'Unknown')
            print(f"Counter retrieved: {counter} (frontend: {frontend_pod}, backend: {hostname})")
            return jsonify({
                'counter': counter,
                'backend_pod': hostname,
                'frontend_pod': frontend_pod,
                'version': app_version
            })
        except Exception as e:
            redis_errors.inc()
            print(f"Error retrieving counter: {str(e)}")
            return jsonify({'error': str(e)}), 500

    @app.route('/api/counter', methods=['POST'])
    def increment_counter():
        try:
            counter = r.incr('visit_counter')
            counter_increments.inc()
            current_counter_value.set(counter)
            frontend_pod = request.headers.get('X-Frontend-Pod', 'Unknown')
            print(f"Counter incremented to {counter} (frontend: {frontend_pod}, backend: {hostname})")
            return jsonify({
                'counter': counter,
                'backend_pod': hostname,
                'frontend_pod': frontend_pod,
                'version': app_version
            })
        except Exception as e:
            redis_errors.inc()
            print(f"Error incrementing counter: {str(e)}")
            return jsonify({'error': str(e)}), 500

    @app.route('/api/counter/reset', methods=['POST'])
    def reset_counter():
        try:
            r.set('visit_counter', 0)
            current_counter_value.set(0)
            frontend_pod = request.headers.get('X-Frontend-Pod', 'Unknown')
            print(f"Counter reset to 0 (frontend: {frontend_pod}, backend: {hostname})")
            return jsonify({
                'counter': 0,
                'backend_pod': hostname,
                'frontend_pod': frontend_pod,
                'version': app_version
            })
        except Exception as e:
            redis_errors.inc()
            print(f"Error resetting counter: {str(e)}")
            return jsonify({'error': str(e)}), 500

    @app.route('/health', methods=['GET'])
    def health():
        return jsonify({'status': 'healthy', 'version': app_version})

    @app.route('/metrics', methods=['GET'])
    def metrics():
        return generate_latest(), 200, {'Content-Type': CONTENT_TYPE_LATEST}

    if __name__ == '__main__':
        print(f"🚀 Starting Guestbook Backend - Version {app_version}")
        print(f"📍 Running on pod: {hostname}")
        print(f"📊 Prometheus metrics available at /metrics")
        app.run(host='0.0.0.0', port=5000)

  requirements.txt: |
    flask==3.0.0
    flask-cors==4.0.0
    redis==5.0.1
    prometheus-client==0.19.0
