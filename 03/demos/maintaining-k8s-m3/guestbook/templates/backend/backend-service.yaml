apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-backend
  labels:
    app: {{ .Chart.Name }}-backend
    tier: backend
spec:
  type: {{ .Values.backend.service.type }}
  ports:
    - port: {{ .Values.backend.service.port }}
      targetPort: 5000
      protocol: TCP
      name: http
  selector:
    {{- if .Values.backend.service.selector }}
    {{- toYaml .Values.backend.service.selector | nindent 4 }}
    {{- else }}
    app: {{ .Chart.Name }}-backend
    tier: backend
    {{- end }}
