# Troubleshooting Scenario: CrashLoopBackOff
# This scenario demonstrates a backend application that crashes due to
# an invalid Redis connection configuration.
#
# Deploy with: helm upgrade guestbook ./demo-app -f scenarios/crashloopbackoff-values.yaml
# Revert with: helm upgrade guestbook ./demo-app

# Backend configuration - intentionally misconfigured
backend:
  replicaCount: 2  # Reduced replicas to make scenario clearer
  image:
    repository: python
    tag: "3.11-slim"
  service:
    type: ClusterIP
    port: 5000
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "256Mi"
      cpu: "200m"
  appVersion: "2.1.4"
  podDisruptionBudget:
    enabled: false  # Disabled for troubleshooting scenario

  # BROKEN CONFIGURATION: Invalid Redis hostname
  # This will cause the backend to crash when it tries to connect
  redisHost: "redis-service-does-not-exist"

# Frontend - keep it working to show partial system failure
frontend:
  replicaCount: 2
  image:
    repository: nginx
    tag: "1.25"
  service:
    type: ClusterIP
    port: 80
  resources:
    requests:
      memory: "64Mi"
      cpu: "100m"
    limits:
      memory: "128Mi"
      cpu: "200m"
  podDisruptionBudget:
    enabled: false

# Redis - keep it working
redis:
  image:
    repository: redis
    tag: "7-alpine"
  persistence:
    enabled: true
    size: 1Gi
